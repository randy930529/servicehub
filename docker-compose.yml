# ServiceHub backend stack: Next.js API (server/) + MongoDB.
# The Expo app runs on the host (pnpm start) and talks to the API at
# http://localhost:3000 — which is already the default in api-config.ts.
#
#   docker compose up -d --build        # production build (next start)
#   docker compose logs -f server       # follow API logs
#   docker compose exec server pnpm seed   # seed the services catalog
#   docker compose down                 # stop (add -v to also wipe Mongo data)

services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env.local
    environment:
      # Override the host-oriented URI from .env.local: inside the compose
      # network the DB is reachable at the "mongo" service name, not 127.0.0.1.
      NEXT_MONGODB_URI: mongodb://mongo:27017/servicehub
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
